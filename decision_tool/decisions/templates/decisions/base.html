<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Decision Tool{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .step-bar { display: flex; gap: 8px; margin-bottom: 2rem; }
        .step-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
        .step-dot.active { background: #1A3A6E; color: white; }
        .step-dot.done { background: #1A5E35; color: white; }
        .step-dot.pending { background: #dee2e6; color: #6c757d; }
        .step-line { flex: 1; height: 2px; background: #dee2e6; align-self: center; }
        .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
        .rank-first { background: #fff8e1 !important; }
        .rank-second { background: #f8f9fa !important; }
        .score-bar-wrap { background: #e9ecef; border-radius: 4px; height: 10px; }
        .score-bar { background: #1A3A6E; border-radius: 4px; height: 10px; transition: width 0.5s ease; }
        .rank-badge { width: 28px; height: 28px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; }
        .rank-1 { background: #ffd700; color: #333; }
        .rank-2 { background: #c0c0c0; color: #333; }
        .rank-3 { background: #cd7f32; color: white; }
        .stability-stable { color: #1A5E35; }
        .stability-unstable { color: #c0392b; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
<nav class="navbar navbar-light bg-white border-bottom no-print mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="{% url 'step1_role' %}">Decision Tool</a>
        <div class="d-flex gap-3">
            <a href="{% url 'decision_list' %}" class="nav-link text-secondary">History</a>
            <a href="{% url 'start_over' %}" class="nav-link text-danger">Start Over</a>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 860px;">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
